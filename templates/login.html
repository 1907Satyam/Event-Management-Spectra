<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra 6.0 - Admin Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f19; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Floating Animation */
        @keyframes levitate { 0% { transform: translateY(0px); box-shadow: 0 10px 30px rgba(0, 240, 255, 0.1); } 50% { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(112, 0, 255, 0.3); } 100% { transform: translateY(0px); box-shadow: 0 10px 30px rgba(0, 240, 255, 0.1); } }
        
        .login-box { background: rgba(20, 25, 35, 0.85); padding: 40px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 100%; max-width: 350px; animation: levitate 4s ease-in-out infinite; }
        h2 { color: #00f0ff; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; margin-bottom: 25px; }
        
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 20px; box-sizing: border-box; background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 6px; transition: 0.3s; }
        input[type="password"]:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }
        
        button { background: linear-gradient(45deg, #7000ff, #00f0ff); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; text-transform: uppercase; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px rgba(0, 240, 255, 0.6); transform: translateY(-2px); }
        .error { color: #ff6060; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Access</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Enter Admin Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
